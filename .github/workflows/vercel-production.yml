name: Vercel Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Deploy to Vercel production
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          if [ -n "${VERCEL_DEPLOY_HOOK}" ]; then
            echo "Triggering Vercel deploy hook..."
            curl -fsS -X POST "${VERCEL_DEPLOY_HOOK}"
            echo "Deploy hook triggered."
            exit 0
          fi

          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::error::No Vercel deploy credentials configured."
            echo "Add GitHub secret VERCEL_DEPLOY_HOOK (easiest) from Vercel → Project → Settings → Git → Deploy Hooks,"
            echo "or add VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID for CLI deploys."
            exit 1
          fi

          npm ci
          npx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
          npx vercel build --prod --token="${VERCEL_TOKEN}"
          npx vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
